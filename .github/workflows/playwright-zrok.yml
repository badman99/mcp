name: Playwright MCP Server with zrok Tunnel

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop
  push:
    branches: [main]
  schedule:
    - cron: '0 */5 * * *'

env:
  ZROK_TOKEN: jphzLUZd8sIM
  PLAYWRIGHT_PORT: 3002

jobs:
  playwright-mcp-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright MCP
        run: |
          npm install -g @playwright/mcp@latest
          npx playwright install chromium
          npx playwright install-deps chromium || true

      - name: Install zrok
        run: |
          echo "🔍 Installing zrok..."
          # Method 1: Try official install script
          if curl -s https://get.zrok.io | bash; then
            echo "✅ zrok installed via script"
          else
            # Method 2: Direct download with Python parsing
            echo "📥 Trying direct download..."
            python3 -c "
import urllib.request, json, sys
url = 'https://api.github.com/repos/openziti/zrok/releases/latest'
req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
try:
    response = urllib.request.urlopen(req)
    data = json.loads(response.read().decode())
    for asset in data.get('assets', []):
        name = asset.get('name', '')
        if 'linux' in name and 'amd64' in name and '.tar.gz' in name:
            download_url = asset['browser_download_url']
            print(f'Found: {download_url}')
            # Download it
            req2 = urllib.request.Request(download_url, headers={'User-Agent': 'Mozilla/5.0'})
            response2 = urllib.request.urlopen(req2)
            with open('zrok.tar.gz', 'wb') as f:
                f.write(response2.read())
            print('✅ Downloaded')
            break
except Exception as e:
    print(f'Error: {e}')
    sys.exit(1)
"
            tar -xzf zrok.tar.gz -C /usr/local/bin zrok 2>/dev/null || tar -xzf zrok.tar.gz && mv zrok /usr/local/bin/
            chmod +x /usr/local/bin/zrok
          fi
          zrok version

      - name: Enable zrok environment
        run: |
          echo "$ZROK_TOKEN" | zrok enable
          echo "✅ zrok enabled"

      - name: Reserve static share (if not exists)
        run: |
          zrok reserve public localhost:$PLAYWRIGHT_PORT --unique-name playwright-mcp-gha || true
          echo "✅ Static share reserved: https://playwright-mcp-gha.share.zrok.io"

      - name: Start Playwright MCP Server
        run: |
          echo "🚀 Starting Playwright MCP Server on port $PLAYWRIGHT_PORT..."
          npx @playwright/mcp@latest \
            --headless \
            --port $PLAYWRIGHT_PORT \
            --host 0.0.0.0 \
            --browser chromium &
          MCP_PID=$!
          echo "MCP_PID=$MCP_PID" >> $GITHUB_ENV
          
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:$PLAYWRIGHT_PORT > /dev/null 2>&1; then
              echo "✅ Playwright MCP Server is ready!"
              break
            fi
            sleep 1
          done

      - name: Start zrok Tunnel
        run: |
          echo "🔗 Starting zrok tunnel..."
          echo "🌐 Your static URL: https://playwright-mcp-gha.share.zrok.io"
          echo ""
          echo "📋 Add this to your OpenCode config:"
          echo '  {"mcp": {"playwright": {"type": "http", "url": "https://playwright-mcp-gha.share.zrok.io"}}}'
          echo ""
          
          # Start zrok tunnel (this will block)
          zrok share reserved playwright-mcp-gha
