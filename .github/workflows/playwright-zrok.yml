name: Playwright MCP Server

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'

env:
  ZROK_TOKEN: jphzLUZd8sIM
  PORT: 3002

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install zrok
        run: |
          # Download zrok directly from GitHub releases
          ZROK_VERSION=$(curl -s https://api.github.com/repos/openziti/zrok/releases/latest | grep -o '"tag_name": "[^"]*"' | cut -d'"' -f4)
          echo "📥 Downloading zrok $ZROK_VERSION..."
          wget -q "https://github.com/openziti/zrok/releases/download/${ZROK_VERSION}/zrok_${ZROK_VERSION#v}_linux_amd64.tar.gz" -O zrok.tar.gz
          tar -xzf zrok.tar.gz
          chmod +x zrok
          sudo mv zrok /usr/local/bin/
          zrok version

      - name: Enable zrok
        run: |
          echo "$ZROK_TOKEN" | zrok enable

      - name: Reserve static URL
        run: |
          zrok reserve public localhost:$PORT -n playwright-mcp-gha || true
          echo "✅ URL: https://playwright-mcp-gha.share.zrok.io"

      - name: Install Playwright
        run: |
          npm install -g @playwright/mcp@latest
          npx playwright install chromium

      - name: Start MCP Server
        run: |
          npx @playwright/mcp@latest --headless --port $PORT --host 0.0.0.0 &
          sleep 5
          curl -s http://localhost:$PORT > /dev/null && echo "✅ MCP ready"

      - name: Start Tunnel
        run: |
          echo "🌐 https://playwright-mcp-gha.share.zrok.io"
          zrok share reserved playwright-mcp-gha
