name: Playwright MCP Server

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'

env:
  ZROK_TOKEN: jphzLUZd8sIM
  PORT: 3002

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install zrok
        run: |
          echo "📥 Downloading zrok v2.0.4..."
          wget -q "https://github.com/openziti/zrok/releases/download/v2.0.4/zrok_2.0.4_linux_amd64.tar.gz" -O zrok.tar.gz
          tar -xzf zrok.tar.gz
          mv zrok2 zrok
          chmod +x zrok
          sudo mv zrok /usr/local/bin/

      - name: Enable zrok
        run: |
          zrok enable $ZROK_TOKEN --headless

      - name: Create share (if not exists)
        run: |
          zrok create share --share-token playwright-mcp-gha --backend-mode proxy --open || true

      - name: Install Playwright
        run: |
          npm install -g @playwright/mcp@latest
          npx playwright install chromium

      - name: Start MCP Server
        run: |
          npx @playwright/mcp@latest --headless --port $PORT --host 0.0.0.0 &
          sleep 5
          curl -s http://localhost:$PORT > /dev/null && echo "✅ MCP ready"

      - name: Start zrok Tunnel
        run: |
          zrok share public localhost:$PORT --headless &
          sleep 5
          echo "🌐 zrok tunnel started"
          # Keep job alive
          while true; do
            sleep 60
            echo "⏳ $(date) - Tunnel running..."
          done
