name: Playwright MCP Server

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'

env:
  PORT: 3002

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bore
        run: |
          echo "📥 Downloading bore..."
          curl -sL "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz" -o bore.tar.gz
          tar -xzf bore.tar.gz
          chmod +x bore
          sudo mv bore /usr/local/bin/

      - name: Install Playwright
        run: |
          npm install -g @playwright/mcp@latest
          npx playwright install chromium

      - name: Start MCP Server + bore Tunnel
        run: |
          # Start MCP server in background
          npx @playwright/mcp@latest --headless --port $PORT --host 0.0.0.0 --allowed-hosts '*' > mcp.log 2>&1 &
          MCP_PID=$!
          
          # Wait for MCP to be ready
          for i in {1..30}; do
            if curl -s http://localhost:$PORT > /dev/null 2>&1; then
              echo "✅ MCP server ready on port $PORT"
              break
            fi
            sleep 1
          done
          
          # Check if MCP started
          if ! kill -0 $MCP_PID 2>/dev/null; then
            echo "❌ MCP server failed to start"
            cat mcp.log
            exit 1
          fi
          
          # Start bore tunnel in background
          echo "🌐 Starting bore tunnel..."
          bore local $PORT --to bore.pub > bore.log 2>&1 &
          BORE_PID=$!
          
          # Wait for bore to connect and extract URL
          sleep 5
          BORE_URL=$(grep -oE 'bore\.pub:[0-9]+' bore.log | head -1)
          
          if [ -n "$BORE_URL" ]; then
            echo ""
            echo "========================================"
            echo "🚀 PLAYWRIGHT MCP LIVE AT:"
            echo "http://$BORE_URL"
            echo "========================================"
            echo ""
            
            # Test the URL
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://$BORE_URL" 2>&1 || echo "000")
            echo "🧪 URL test result: HTTP $HTTP_CODE"
          else
            echo "⚠️ Could not extract bore URL, showing logs:"
            cat bore.log
          fi
          
          # Keep both processes alive
          while kill -0 $MCP_PID 2>/dev/null; do
            if ! kill -0 $BORE_PID 2>/dev/null; then
              echo "⚠️ bore tunnel died, restarting..."
              bore local $PORT --to bore.pub > bore.log 2>&1 &
              BORE_PID=$!
              sleep 5
              
              BORE_URL=$(grep -oE 'bore\.pub:[0-9]+' bore.log | tail -1)
              if [ -n "$BORE_URL" ]; then
                echo "🔄 Reconnected at: http://$BORE_URL"
              fi
            fi
            sleep 60
            echo "⏳ $(date) - Server running..."
          done
          
          echo "❌ MCP server died. Log:"
          cat mcp.log
          exit 1
