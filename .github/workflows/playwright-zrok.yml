name: Playwright MCP Server

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'

env:
  MCP_PORT: 3002
  STORAGE_PORT: 3003
  ROUTER_PORT: 8080
  SCREENSHOTS_DIR: /tmp/storage/screenshots
  UPLOADS_DIR: /tmp/storage/uploads

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo "📦 Installing tools..."
          npm install -g @playwright/mcp@latest serve
          npx playwright install chrome --with-deps
          
          # cloudflared install
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          echo "✅ All dependencies ready!"

      - name: Setup Chrome no-sandbox wrapper
        run: |
          CHROME_BIN=$(find ~/.cache/ms-playwright -type f -name 'chrome' 2>/dev/null | head -1)
          echo "🔍 Chrome found: $CHROME_BIN"
          sudo tee /usr/local/bin/chrome-nosandbox > /dev/null << WRAP
          #!/bin/bash
          exec "$CHROME_BIN" --no-sandbox --disable-setuid-sandbox "\$@"
          WRAP
          sudo chmod +x /usr/local/bin/chrome-nosandbox
          echo "✅ Chrome wrapper ready!"

      - name: Create storage directories
        run: |
          mkdir -p $SCREENSHOTS_DIR $UPLOADS_DIR
          echo "✅ Storage dirs ready!"

      - name: Start Playwright MCP
        run: |
          echo "🎭 Starting Playwright MCP on :$MCP_PORT..."
          PLAYWRIGHT_CHROME_EXECUTABLE_PATH=/usr/local/bin/chrome-nosandbox \
          npx @playwright/mcp@latest \
            --headless \
            --port $MCP_PORT \
            --host 127.0.0.1 \
            --browser chrome-for-testing \
            --allowed-origins '*' \
            --allowed-hosts '*' \
            --output-dir $SCREENSHOTS_DIR \
            > /tmp/mcp.log 2>&1 &

          # Wait for MCP
          for i in {1..30}; do
            nc -z localhost $MCP_PORT 2>/dev/null && echo "✅ MCP ready!" && break
            [ $i -eq 30 ] && echo "❌ MCP failed!" && cat /tmp/mcp.log && exit 1
            sleep 2
          done

      - name: Start Storage File Server
        run: |
          echo "📁 Starting storage server on :$STORAGE_PORT..."
          serve /tmp/storage \
            --listen $STORAGE_PORT \
            --no-clipboard \
            --cors \
            > /tmp/storage.log 2>&1 &
          sleep 2
          nc -z localhost $STORAGE_PORT && echo "✅ Storage server ready!" || echo "⚠️ Storage server issue"

      - name: Start Local Router
        run: |
          echo "🚦 Starting router on :$ROUTER_PORT..."
          node scripts/router.js > /tmp/router.log 2>&1 &
          sleep 2
          curl -sf http://localhost:$ROUTER_PORT/health > /dev/null && echo "✅ Router ready!" || (cat /tmp/router.log && exit 1)

      - name: Start Cloudflare Tunnel + Register with Worker
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          echo "☁️ Starting Cloudflare Quick Tunnel..."
          cloudflared tunnel --url http://localhost:$ROUTER_PORT \
            --logfile /tmp/cloudflared.log \
            --no-autoupdate \
            > /tmp/cf.log 2>&1 &
          CF_PID=$!

          # Tunnel URL milne ka wait karo
          echo "⏳ Waiting for tunnel URL..."
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cloudflared.log 2>/dev/null | head -1)
            [ -n "$TUNNEL_URL" ] && break
            sleep 2
          done

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Tunnel URL nahi mili!"
            cat /tmp/cloudflared.log
            exit 1
          fi

          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║  🌐 TUNNEL: $TUNNEL_URL"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  🎭 MCP:     $WORKER_URL/playwright/sse"
          echo "║  📁 Storage: $WORKER_URL/storage/"
          echo "╚══════════════════════════════════════════════╝"
          echo ""

          # Worker ko register karo
          echo "📡 Registering with Worker..."
          REGISTER_RESP=$(curl -sf -X POST "$WORKER_URL/register" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: $AUTH_TOKEN" \
            -d "{\"tunnelUrl\": \"$TUNNEL_URL\"}" 2>&1)
          
          echo "Worker response: $REGISTER_RESP"
          echo "✅ Runner registered!"

          # Keep alive — re-register every 30 min + check processes
          while kill -0 $CF_PID 2>/dev/null; do
            sleep 1800
            echo "🔄 $(date) - Re-registering with worker..."
            curl -sf -X POST "$WORKER_URL/register" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: $AUTH_TOKEN" \
              -d "{\"tunnelUrl\": \"$TUNNEL_URL\"}" || true
            echo "⏳ $(date) - Still running..."
          done

          echo "❌ Cloudflare tunnel died!"
          cat /tmp/cloudflared.log
          exit 1
