name: Playwright MCP Server

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'

env:
  PORT: 3002

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bore
        run: |
          echo "📥 Downloading bore..."
          curl -sL "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz" -o bore.tar.gz
          tar -xzf bore.tar.gz && chmod +x bore && sudo mv bore /usr/local/bin/
          echo "✅ bore ready!"

      - name: Install Playwright MCP
        run: |
          echo "📦 Installing @playwright/mcp..."
          npm install -g @playwright/mcp@latest
          echo "🌐 Installing Chromium + deps..."
          npx playwright install chromium --with-deps
          echo "✅ Done!"

      - name: Patch Chromium for no-sandbox
        run: |
          # Find chromium binary and wrap it with --no-sandbox
          CHROMIUM_BIN=$(find ~/.cache/ms-playwright -type f -name 'chrome' -o -name 'chromium' 2>/dev/null | grep -v '\.1/' | head -1)
          echo "Found chromium at: $CHROMIUM_BIN"
          
          sudo tee /usr/local/bin/chromium-sandbox-fix > /dev/null << WRAP
          #!/bin/bash
          exec "$CHROMIUM_BIN" --no-sandbox --disable-setuid-sandbox "\$@"
          WRAP
          sudo chmod +x /usr/local/bin/chromium-sandbox-fix
          echo "✅ Chromium wrapper created!"

      - name: Start MCP Server + bore Tunnel
        run: |
          echo "🚀 Starting Playwright MCP server..."
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/local/bin/chromium-sandbox-fix \
          npx @playwright/mcp@latest \
            --headless \
            --port $PORT \
            --host 0.0.0.0 \
            --browser chromium \
            > mcp.log 2>&1 &
          MCP_PID=$!

          # ✅ FIX: nc se port check karo, curl /sse se NAHI (SSE hang karta hai!)
          echo "⏳ Waiting for MCP server on port $PORT..."
          for i in {1..30}; do
            if nc -z localhost $PORT 2>/dev/null; then
              echo "✅ MCP server ready on port $PORT!"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
            # Show logs if stuck
            if [ $i -eq 15 ]; then
              echo "--- mcp.log so far ---"
              cat mcp.log
              echo "---"
            fi
          done

          # Final check
          if ! kill -0 $MCP_PID 2>/dev/null; then
            echo "❌ MCP server failed to start. Logs:"
            cat mcp.log
            exit 1
          fi

          # Start bore tunnel
          echo "🌐 Starting bore tunnel..."
          bore local $PORT --to bore.pub > bore.log 2>&1 &
          BORE_PID=$!
          sleep 5

          BORE_URL=$(grep -oE 'bore\.pub:[0-9]+' bore.log | head -1)

          if [ -n "$BORE_URL" ]; then
            echo ""
            echo "========================================"
            echo "🎭 PLAYWRIGHT MCP LIVE AT:"
            echo "   SSE  → http://$BORE_URL/sse"
            echo "========================================"
            echo ""
            echo "📝 opencode.jsonc mein ye daalo:"
            echo '{'
            echo '  "mcp": {'
            echo '    "playwright": {'
            echo '      "type": "sse",'
            echo "      \"url\": \"http://$BORE_URL/sse\""
            echo '    }'
            echo '  }'
            echo '}'
          else
            echo "⚠️ bore URL nahi mili. bore logs:"
            cat bore.log
          fi

          # Keep alive loop
          while kill -0 $MCP_PID 2>/dev/null; do
            if ! kill -0 $BORE_PID 2>/dev/null; then
              echo "⚠️ bore tunnel died, restarting..."
              bore local $PORT --to bore.pub > bore.log 2>&1 &
              BORE_PID=$!
              sleep 5
              BORE_URL=$(grep -oE 'bore\.pub:[0-9]+' bore.log | tail -1)
              [ -n "$BORE_URL" ] && echo "🔄 Reconnected: http://$BORE_URL/sse"
            fi
            sleep 60
            echo "⏳ $(date) - Server running..."
          done

          echo "❌ MCP server died. Logs:"
          cat mcp.log
          exit 1
