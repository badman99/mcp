name: Playwright MCP Server

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */4 * * *'

env:
  MCP_PORT: 3002
  TERMINAL_PORT: 3004
  WEBDAV_PORT: 3005
  SCREENSHOTS_DIR: /tmp/storage/screenshots
  UPLOADS_DIR: /tmp/storage/uploads
  PLAYWRIGHT_WORKER: https://playwright-runner.badman993944.workers.dev
  TERMINAL_WORKER: https://terminal-runner.badman993944.workers.dev
  WEBDAV_WORKER: https://webdav-runner.badman993944.workers.dev
  AUTH_TOKEN: mcp-runner-2026

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo "📦 Installing tools..."
          npm install -g @playwright/mcp@latest
          npx @playwright/mcp install-browser chromium
          npx playwright install-deps chromium

          echo "🖥️ Installing terminal-mcp-server..."
          git clone https://github.com/weidwonder/terminal-mcp-server.git /tmp/terminal-mcp
          cd /tmp/terminal-mcp && npm install && npm run build
          cd -
          pip install mcp-proxy

          echo "☁️ Installing rclone..."
          curl -s https://rclone.org/install.sh | sudo bash
          echo "✅ rclone $(rclone --version | head -1) ready!"

          echo "📥 Downloading bore..."
          curl -sL "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz" -o bore.tar.gz
          tar -xzf bore.tar.gz && chmod +x bore && sudo mv bore /usr/local/bin/
          echo "✅ All dependencies ready!"

      - name: Create storage directories
        run: |
          mkdir -p $SCREENSHOTS_DIR $UPLOADS_DIR
          echo "✅ Storage dirs ready!"

      - name: Start Playwright MCP
        run: |
          echo "🎭 Starting Playwright MCP on :$MCP_PORT..."
          PLAYWRIGHT_MCP_BROWSER=chromium PLAYWRIGHT_MCP_HEADLESS=true \
          PLAYWRIGHT_MCP_USER_AGENT="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
          npx @playwright/mcp@latest \
            --config stealth-config.json \
            --headless \
            --port $MCP_PORT \
            --host 0.0.0.0 \
            --isolated \
            --no-sandbox \
            --allowed-origins '*' \
            --allowed-hosts '*' \
            --output-dir $SCREENSHOTS_DIR \
            > /tmp/mcp.log 2>&1 &
          for i in {1..30}; do
            nc -z localhost $MCP_PORT 2>/dev/null && echo "✅ MCP ready!" && break
            [ $i -eq 30 ] && echo "❌ MCP failed!" && cat /tmp/mcp.log && exit 1
            sleep 2
          done

      - name: Start Terminal MCP
        run: |
          echo "🖥️ Starting terminal MCP on :$TERMINAL_PORT..."
          mcp-proxy \
            --port $TERMINAL_PORT \
            --host 0.0.0.0 \
            --allow-origin '*' \
            -- node /tmp/terminal-mcp/build/index.js \
            > /tmp/terminal.log 2>&1 &
          sleep 4
          if nc -z localhost $TERMINAL_PORT; then
            echo "✅ Terminal MCP ready!"
          else
            echo "❌ Terminal MCP failed!"
            cat /tmp/terminal.log
            exit 1
          fi

      - name: Start WebDAV Server
        run: |
          echo "📂 Starting rclone WebDAV on :$WEBDAV_PORT (serving /)..."
          rclone serve webdav / \
            --addr 0.0.0.0:$WEBDAV_PORT \
            --allow-origin '*' \
            --no-checksum \
            --vfs-links \
            --vfs-cache-mode full \
            --dir-cache-time 10s \
            > /tmp/webdav.log 2>&1 &
          sleep 3
          nc -z localhost $WEBDAV_PORT \
            && echo "✅ WebDAV ready!" \
            || (echo "⚠️ WebDAV issue:" && cat /tmp/webdav.log)

      - name: Start Tunnels + Watchdog
        run: |
          register_worker() {
            local worker_url="$1"
            local tunnel_url="$2"
            echo "📡 Registering $tunnel_url → $worker_url"
            curl -sf -X POST "$worker_url/register" \
              -H "Content-Type: application/json" \
              -H "X-Auth-Token: $AUTH_TOKEN" \
              -d "{\"tunnelUrl\": \"$tunnel_url\"}" 2>&1 || true
          }

          start_bore() {
            local port="$1"
            local log="/tmp/bore-${port}.log"
            rm -f "$log"
            bore local $port --to bore.pub > "$log" 2>&1 &
            local pid=$!
            sleep 5
            local url=$(grep -oE 'bore\.pub:[0-9]+' "$log" | head -1)
            if [ -z "$url" ]; then
              echo "❌ bore.pub URL not found for port $port!"
              cat "$log"
              return 1
            fi
            echo "$pid:http://$url"
          }

          restart_mcp() {
            echo "🔄 Restarting MCP on :$MCP_PORT..."
            fuser -k $MCP_PORT/tcp 2>/dev/null || true
            sleep 1
            PLAYWRIGHT_MCP_BROWSER=chromium PLAYWRIGHT_MCP_HEADLESS=true \
            PLAYWRIGHT_MCP_USER_AGENT="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
            npx @playwright/mcp@latest \
              --config stealth-config.json \
              --headless \
              --port $MCP_PORT \
              --host 0.0.0.0 \
              --isolated \
              --no-sandbox \
              --allowed-origins '*' \
              --allowed-hosts '*' \
              --output-dir $SCREENSHOTS_DIR \
              > /tmp/mcp.log 2>&1 &
            for i in $(seq 1 15); do
              nc -z localhost $MCP_PORT 2>/dev/null && echo "✅ MCP restarted!" && return 0
              sleep 2
            done
            echo "❌ MCP restart failed!"
            return 1
          }

          restart_terminal() {
            echo "🔄 Restarting Terminal on :$TERMINAL_PORT..."
            fuser -k $TERMINAL_PORT/tcp 2>/dev/null || true
            sleep 1
            mcp-proxy \
              --port $TERMINAL_PORT \
              --host 0.0.0.0 \
              --allow-origin '*' \
              -- node /tmp/terminal-mcp/build/index.js \
              > /tmp/terminal.log 2>&1 &
            for i in $(seq 1 10); do
              nc -z localhost $TERMINAL_PORT 2>/dev/null && echo "✅ Terminal restarted!" && return 0
              sleep 2
            done
            echo "❌ Terminal restart failed!"
            return 1
          }

          restart_webdav() {
            echo "🔄 Restarting WebDAV on :$WEBDAV_PORT..."
            fuser -k $WEBDAV_PORT/tcp 2>/dev/null || true
            sleep 1
            rclone serve webdav / \
              --addr 0.0.0.0:$WEBDAV_PORT \
              --allow-origin '*' \
              --no-checksum \
              --vfs-links \
              --vfs-cache-mode full \
              --dir-cache-time 10s \
              > /tmp/webdav.log 2>&1 &
            for i in $(seq 1 10); do
              nc -z localhost $WEBDAV_PORT 2>/dev/null && echo "✅ WebDAV restarted!" && return 0
              sleep 2
            done
            echo "❌ WebDAV restart failed!"
            return 1
          }

          # ─── Start all 3 bore tunnels ────────────────────────────
          MCP_BORE=$(start_bore $MCP_PORT) || exit 1
          MCP_BORE_PID=${MCP_BORE%%:*}
          MCP_TUNNEL=${MCP_BORE#*:}

          TERMINAL_BORE=$(start_bore $TERMINAL_PORT) || exit 1
          TERMINAL_BORE_PID=${TERMINAL_BORE%%:*}
          TERMINAL_TUNNEL=${TERMINAL_BORE#*:}

          WEBDAV_BORE=$(start_bore $WEBDAV_PORT) || exit 1
          WEBDAV_BORE_PID=${WEBDAV_BORE%%:*}
          WEBDAV_TUNNEL=${WEBDAV_BORE#*:}

          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  🎭 Playwright: $MCP_TUNNEL"
          echo "║     → $PLAYWRIGHT_WORKER/sse"
          echo "║  🖥️ Terminal:   $TERMINAL_TUNNEL"
          echo "║     → $TERMINAL_WORKER/sse"
          echo "║  📂 WebDAV:    $WEBDAV_TUNNEL"
          echo "║     → $WEBDAV_WORKER/"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""

          # ─── Register all 3 workers ─────────────────────────────
          register_worker "$PLAYWRIGHT_WORKER" "$MCP_TUNNEL"
          register_worker "$TERMINAL_WORKER" "$TERMINAL_TUNNEL"
          register_worker "$WEBDAV_WORKER" "$WEBDAV_TUNNEL"

          # ─── Verify registration ────────────────────────────────
          sleep 2
          verify_worker() {
            local port="$1"
            local tunnel="$2"
            local worker="$3"
            local reg_url=$(curl -sf --max-time 3 "$worker/health" 2>/dev/null | grep -oE '"tunnelUrl":"[^"]*"' | head -1 | cut -d'"' -f4)
            if [ "$reg_url" != "$tunnel" ]; then
              echo "⚠️ Worker :$port has stale URL ($reg_url), forcing re-register..."
              register_worker "$worker" "$tunnel"
            else
              echo "✅ Worker :$port verified ($tunnel)"
            fi
          }
          verify_worker "$MCP_PORT" "$MCP_TUNNEL" "$PLAYWRIGHT_WORKER"
          verify_worker "$TERMINAL_PORT" "$TERMINAL_TUNNEL" "$TERMINAL_WORKER"
          verify_worker "$WEBDAV_PORT" "$WEBDAV_TUNNEL" "$WEBDAV_WORKER"
          echo "✅ All runners registered!"

          # ─── Watchdog Loop ──────────────────────────────────────
          echo "🐶 Watchdog started — monitoring every 5 seconds..."
          LAST_REGISTER=$(date +%s)

          while true; do
            sleep 5

            # --- Service health checks ---
            if ! nc -z localhost $MCP_PORT 2>/dev/null; then
              echo "⚠️ $(date) — MCP :$MCP_PORT down! Restarting..."
              restart_mcp
            fi

            if ! nc -z localhost $TERMINAL_PORT 2>/dev/null; then
              echo "⚠️ $(date) — Terminal :$TERMINAL_PORT down! Restarting..."
              restart_terminal
            fi

            if ! nc -z localhost $WEBDAV_PORT 2>/dev/null; then
              echo "⚠️ $(date) — WebDAV :$WEBDAV_PORT down! Restarting..."
              restart_webdav
            fi

            # --- Bore tunnel health checks ---
            check_bore() {
              local port="$1"
              local bore_pid="$2"
              local tunnel="$3"
              local worker="$4"

              if ! kill -0 $bore_pid 2>/dev/null; then
                echo "🔴 $(date) — Bore for :$port process died! Reconnecting..."
                local new_bore=$(start_bore $port) || return
                local new_pid=${new_bore%%:*}
                local new_tunnel=${new_bore#*:}
                case $port in
                  $MCP_PORT) MCP_BORE_PID="$new_pid"; MCP_TUNNEL="$new_tunnel" ;;
                  $TERMINAL_PORT) TERMINAL_BORE_PID="$new_pid"; TERMINAL_TUNNEL="$new_tunnel" ;;
                  $WEBDAV_PORT) WEBDAV_BORE_PID="$new_pid"; WEBDAV_TUNNEL="$new_tunnel" ;;
                esac
                register_worker "$worker" "$new_tunnel"
                return
              fi

              local worker_health=$(curl -sf --max-time 5 "$worker/health" 2>/dev/null)
              if [ -n "$worker_health" ]; then
                local registered_url=$(echo "$worker_health" | grep -oE '"tunnelUrl":"[^"]*"' | head -1 | cut -d'"' -f4)
                if [ -n "$registered_url" ] && [ "$registered_url" != "$tunnel" ]; then
                  echo "⚠️ $(date) — Worker :$port has stale URL ($registered_url), re-registering ($tunnel)..."
                  register_worker "$worker" "$tunnel"
                fi
              fi
            }

            check_bore "$MCP_PORT" "$MCP_BORE_PID" "$MCP_TUNNEL" "$PLAYWRIGHT_WORKER"
            check_bore "$TERMINAL_PORT" "$TERMINAL_BORE_PID" "$TERMINAL_TUNNEL" "$TERMINAL_WORKER"
            check_bore "$WEBDAV_PORT" "$WEBDAV_BORE_PID" "$WEBDAV_TUNNEL" "$WEBDAV_WORKER"

            # --- Periodic re-register every 30 min ---
            NOW=$(date +%s)
            if [ $((NOW - LAST_REGISTER)) -ge 1800 ]; then
              echo "🔄 $(date) — Periodic re-register..."
              register_worker "$PLAYWRIGHT_WORKER" "$MCP_TUNNEL"
              register_worker "$TERMINAL_WORKER" "$TERMINAL_TUNNEL"
              register_worker "$WEBDAV_WORKER" "$WEBDAV_TUNNEL"
              LAST_REGISTER=$NOW
            fi
          done
