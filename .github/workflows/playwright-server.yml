name: Playwright MCP Server

on:
  workflow_dispatch:
  push:
    branches: [main]
  # schedule:
  #   - cron: '0 */4 * * *'

concurrency:
  group: gha-server
  cancel-in-progress: true

env:
  MCP_PORT: 3002
  TERMINAL_PORT: 3004
  WEBDAV_PORT: 3005
  SCREENSHOTS_DIR: /tmp/storage/screenshots
  UPLOADS_DIR: /tmp/storage/uploads
  PLAYWRIGHT_WORKER: https://playwright-runner.badman993944.workers.dev
  TERMINAL_WORKER: https://terminal-runner.badman993944.workers.dev
  WEBDAV_WORKER: https://webdav-runner.badman993944.workers.dev
  AUTH_TOKEN: mcp-runner-2026

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo "📦 Installing tools..."
          npm install -g @playwright/mcp@latest
          npx playwright install-deps chromium

          echo "🥷 Installing CloakBrowser stealth binary..."
          npm install cloakbrowser playwright-core
          node --input-type=module -e "import{ensureBinary}from'cloakbrowser';const p=await ensureBinary();console.log('✅ Binary:',p)"
          CLOAK_PATH=$(find ~/.cloakbrowser -name "chrome" -type f | head -1)
          if [ -z "$CLOAK_PATH" ]; then
            echo "❌ CloakBrowser binary not found!"
            find ~/.cloakbrowser -type f 2>/dev/null || echo "No ~/.cloakbrowser dir"
            exit 1
          fi
          echo "CLOAKBROWSER_PATH=$CLOAK_PATH" >> $GITHUB_ENV
          echo "✅ CloakBrowser binary: $CLOAK_PATH"

          echo "🔤 Installing fonts for anti-bot canvas hash matching..."
          sudo apt-get update -qq && sudo apt-get install -y -qq \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf 2>/dev/null || true

          echo "🖥️ Installing terminal-mcp-server..."
          git clone https://github.com/weidwonder/terminal-mcp-server.git /tmp/terminal-mcp
          cd /tmp/terminal-mcp && npm install && npm run build
          cd -
          pip install mcp-proxy

          echo "☁️ Installing rclone..."
          curl -s https://rclone.org/install.sh | sudo bash
          echo "✅ rclone $(rclone --version | head -1) ready!"

          echo "📥 Downloading bore..."
          curl -sL "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz" -o bore.tar.gz
          tar -xzf bore.tar.gz && chmod +x bore && sudo mv bore /usr/local/bin/
          echo "✅ All dependencies ready!"

      - name: Configure stealth + storage
        run: |
          mkdir -p $SCREENSHOTS_DIR $UPLOADS_DIR
          echo "🥷 Injecting CloakBrowser executablePath into config..."
          jq --arg path "$CLOAKBROWSER_PATH" \
            '.browser.launchOptions.executablePath = $path' \
            stealth-config.json > /tmp/stealth-config.json
          mv /tmp/stealth-config.json stealth-config.json
          echo "✅ Config updated with binary: $CLOAKBROWSER_PATH"
          cat stealth-config.json | jq '.browser.launchOptions.executablePath'

      - name: Start Playwright MCP
        run: |
          echo "🎭 Starting Playwright MCP (CloakBrowser stealth) on :$MCP_PORT..."
          PLAYWRIGHT_MCP_BROWSER=chromium PLAYWRIGHT_MCP_HEADLESS=true \
          npx @playwright/mcp@latest \
            --config stealth-config.json \
            --headless \
            --port $MCP_PORT \
            --host 0.0.0.0 \
            --isolated \
            --no-sandbox \
            --allowed-origins '*' \
            --allowed-hosts '*' \
            --output-dir $SCREENSHOTS_DIR \
            > /tmp/mcp.log 2>&1 &
          for i in {1..30}; do
            nc -z localhost $MCP_PORT 2>/dev/null && echo "✅ MCP ready!" && break
            [ $i -eq 30 ] && echo "❌ MCP failed!" && cat /tmp/mcp.log && exit 1
            sleep 2
          done

      - name: Start Terminal MCP
        run: |
          echo "🖥️ Starting terminal MCP on :$TERMINAL_PORT..."
          mcp-proxy \
            --port $TERMINAL_PORT \
            --host 0.0.0.0 \
            --allow-origin '*' \
            -- node /tmp/terminal-mcp/build/index.js \
            > /tmp/terminal.log 2>&1 &
          sleep 4
          if nc -z localhost $TERMINAL_PORT; then
            echo "✅ Terminal MCP ready!"
          else
            echo "❌ Terminal MCP failed!"
            cat /tmp/terminal.log
            exit 1
          fi

      - name: Start WebDAV Server
        run: |
          echo "📂 Starting rclone WebDAV on :$WEBDAV_PORT (serving /)..."
          rclone serve webdav / \
            --addr 0.0.0.0:$WEBDAV_PORT \
            --allow-origin '*' \
            --no-checksum \
            --vfs-links \
            --vfs-cache-mode full \
            --dir-cache-time 10s \
            > /tmp/webdav.log 2>&1 &
          sleep 3
          nc -z localhost $WEBDAV_PORT \
            && echo "✅ WebDAV ready!" \
            || (echo "⚠️ WebDAV issue:" && cat /tmp/webdav.log)

      - name: Start Tunnels + Watchdog
        run: |
          REDIS_URL="https://regular-parrot-113383.upstash.io"
          REDIS_TOKEN="gQAAAAAAAbrnAAIgcDIwY2Y5NWJhMzliNDI0ZjcxOTA2ZmZkMzJhOWZkYTliNQ"

          redis_set() {
            local key="$1"
            local value="$2"
            curl -sf -X POST "${REDIS_URL}" \
              -H "Authorization: Bearer ${REDIS_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "[\"SET\",\"${key}\",\"${value}\"]" > /dev/null 2>&1
          }

          start_bore() {
            local port="$1"
            local log="/tmp/bore-${port}.log"
            rm -f "$log"
            bore local $port --to bore.pub > "$log" 2>&1 &
            local pid=$!
            sleep 5
            local url=$(grep -oE 'bore\.pub:[0-9]+' "$log" | head -1)
            if [ -z "$url" ]; then
              echo "❌ bore.pub URL not found for port $port!"
              cat "$log"
              return 1
            fi
            echo "$pid:http://$url"
          }

          restart_mcp() {
            echo "🔄 Restarting MCP on :$MCP_PORT..."
            fuser -k $MCP_PORT/tcp 2>/dev/null || true
            sleep 1
            PLAYWRIGHT_MCP_BROWSER=chromium PLAYWRIGHT_MCP_HEADLESS=true \
            npx @playwright/mcp@latest \
              --config stealth-config.json \
              --headless \
              --port $MCP_PORT \
              --host 0.0.0.0 \
              --isolated \
              --no-sandbox \
              --allowed-origins '*' \
              --allowed-hosts '*' \
              --output-dir $SCREENSHOTS_DIR \
              > /tmp/mcp.log 2>&1 &
            for i in $(seq 1 15); do
              nc -z localhost $MCP_PORT 2>/dev/null && echo "✅ MCP restarted!" && return 0
              sleep 2
            done
            echo "❌ MCP restart failed!"
            return 1
          }

          restart_terminal() {
            echo "🔄 Restarting Terminal on :$TERMINAL_PORT..."
            fuser -k $TERMINAL_PORT/tcp 2>/dev/null || true
            sleep 1
            mcp-proxy \
              --port $TERMINAL_PORT \
              --host 0.0.0.0 \
              --allow-origin '*' \
              -- node /tmp/terminal-mcp/build/index.js \
              > /tmp/terminal.log 2>&1 &
            for i in $(seq 1 10); do
              nc -z localhost $TERMINAL_PORT 2>/dev/null && echo "✅ Terminal restarted!" && return 0
              sleep 2
            done
            echo "❌ Terminal restart failed!"
            return 1
          }

          restart_webdav() {
            echo "🔄 Restarting WebDAV on :$WEBDAV_PORT..."
            fuser -k $WEBDAV_PORT/tcp 2>/dev/null || true
            sleep 1
            rclone serve webdav / \
              --addr 0.0.0.0:$WEBDAV_PORT \
              --allow-origin '*' \
              --no-checksum \
              --vfs-links \
              --vfs-cache-mode full \
              --dir-cache-time 10s \
              > /tmp/webdav.log 2>&1 &
            for i in $(seq 1 10); do
              nc -z localhost $WEBDAV_PORT 2>/dev/null && echo "✅ WebDAV restarted!" && return 0
              sleep 2
            done
            echo "❌ WebDAV restart failed!"
            return 1
          }

          # ─── Start all 3 bore tunnels ────────────────────────────
          MCP_BORE=$(start_bore $MCP_PORT) || exit 1
          MCP_BORE_PID=${MCP_BORE%%:*}
          MCP_TUNNEL=${MCP_BORE#*:}

          TERMINAL_BORE=$(start_bore $TERMINAL_PORT) || exit 1
          TERMINAL_BORE_PID=${TERMINAL_BORE%%:*}
          TERMINAL_TUNNEL=${TERMINAL_BORE#*:}

          WEBDAV_BORE=$(start_bore $WEBDAV_PORT) || exit 1
          WEBDAV_BORE_PID=${WEBDAV_BORE%%:*}
          WEBDAV_TUNNEL=${WEBDAV_BORE#*:}

          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  🎭 Playwright: $MCP_TUNNEL"
          echo "║     → $PLAYWRIGHT_WORKER/sse"
          echo "║  🖥️ Terminal:   $TERMINAL_TUNNEL"
          echo "║     → $TERMINAL_WORKER/sse"
          echo "║  📂 WebDAV:    $WEBDAV_TUNNEL"
          echo "║     → $WEBDAV_WORKER/"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""

          # ─── Save to Redis ──────────────────────────────────────
          redis_set "pw:TUNNEL_URL" "$MCP_TUNNEL"
          redis_set "tm:TUNNEL_URL" "$TERMINAL_TUNNEL"
          redis_set "wd:TUNNEL_URL" "$WEBDAV_TUNNEL"
          echo "✅ All URLs saved to Redis!"

          # ─── Watchdog Loop ──────────────────────────────────────
          echo "🐶 Watchdog started — monitoring every 5 seconds..."

          while true; do
            sleep 5

            # --- Port checks: if port dead → kill old bore, restart service + reconnect bore ---
            if ! nc -z localhost $MCP_PORT 2>/dev/null; then
              echo "⚠️ $(date) — MCP :$MCP_PORT down! Restarting..."
              kill $MCP_BORE_PID 2>/dev/null || true
              restart_mcp
              NEW_BORE=$(start_bore $MCP_PORT) || continue
              MCP_BORE_PID=${NEW_BORE%%:*}
              MCP_TUNNEL=${NEW_BORE#*:}
              redis_set "pw:TUNNEL_URL" "$MCP_TUNNEL"
              echo "📡 MCP bore reconnected → $MCP_TUNNEL"
            fi

            if ! nc -z localhost $TERMINAL_PORT 2>/dev/null; then
              echo "⚠️ $(date) — Terminal :$TERMINAL_PORT down! Restarting..."
              kill $TERMINAL_BORE_PID 2>/dev/null || true
              restart_terminal
              NEW_BORE=$(start_bore $TERMINAL_PORT) || continue
              TERMINAL_BORE_PID=${NEW_BORE%%:*}
              TERMINAL_TUNNEL=${NEW_BORE#*:}
              redis_set "tm:TUNNEL_URL" "$TERMINAL_TUNNEL"
              echo "📡 Terminal bore reconnected → $TERMINAL_TUNNEL"
            fi

            if ! nc -z localhost $WEBDAV_PORT 2>/dev/null; then
              echo "⚠️ $(date) — WebDAV :$WEBDAV_PORT down! Restarting..."
              kill $WEBDAV_BORE_PID 2>/dev/null || true
              restart_webdav
              NEW_BORE=$(start_bore $WEBDAV_PORT) || continue
              WEBDAV_BORE_PID=${NEW_BORE%%:*}
              WEBDAV_TUNNEL=${NEW_BORE#*:}
              redis_set "wd:TUNNEL_URL" "$WEBDAV_TUNNEL"
              echo "📡 WebDAV bore reconnected → $WEBDAV_TUNNEL"
            fi

            # --- Bore PID checks: if bore died → reconnect + update Redis ---
            if ! kill -0 $MCP_BORE_PID 2>/dev/null; then
              echo "🔴 $(date) — Bore for :$MCP_PORT died! Reconnecting..."
              NEW_BORE=$(start_bore $MCP_PORT) || continue
              MCP_BORE_PID=${NEW_BORE%%:*}
              MCP_TUNNEL=${NEW_BORE#*:}
              redis_set "pw:TUNNEL_URL" "$MCP_TUNNEL"
              echo "📡 MCP bore reconnected → $MCP_TUNNEL"
            fi

            if ! kill -0 $TERMINAL_BORE_PID 2>/dev/null; then
              echo "🔴 $(date) — Bore for :$TERMINAL_PORT died! Reconnecting..."
              NEW_BORE=$(start_bore $TERMINAL_PORT) || continue
              TERMINAL_BORE_PID=${NEW_BORE%%:*}
              TERMINAL_TUNNEL=${NEW_BORE#*:}
              redis_set "tm:TUNNEL_URL" "$TERMINAL_TUNNEL"
              echo "📡 Terminal bore reconnected → $TERMINAL_TUNNEL"
            fi

            if ! kill -0 $WEBDAV_BORE_PID 2>/dev/null; then
              echo "🔴 $(date) — Bore for :$WEBDAV_PORT died! Reconnecting..."
              NEW_BORE=$(start_bore $WEBDAV_PORT) || continue
              WEBDAV_BORE_PID=${NEW_BORE%%:*}
              WEBDAV_TUNNEL=${NEW_BORE#*:}
              redis_set "wd:TUNNEL_URL" "$WEBDAV_TUNNEL"
              echo "📡 WebDAV bore reconnected → $WEBDAV_TUNNEL"
            fi
          done
