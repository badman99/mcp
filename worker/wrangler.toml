name = "playwright-runner"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespace - CF dashboard mein banao
# `wrangler kv namespace create RUNNER_KV` se bhi ban sakta hai
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Secrets (wrangler secret put se set karo, kabhi yahan mat likhna!)
# AUTH_TOKEN    — Runner <-> Worker shared secret
# GITHUB_PAT    — GitHub Personal Access Token (repo + workflow scope)
# GITHUB_REPO   — e.g. "badman99/Playwright"
# WORKFLOW_FILE — e.g. "playwright-zrok.yml"
